<h1>Results for: {{ question.question_text }}</h1>
<ul>
  {% for choice in question.choice_set.all %}
    <li>{{ choice.choice_text }} — {{ choice.votes|default:"0" }} votes</li>
  {% empty %}
    <li>No choices yet.</li>
  {% endfor %}
</ul>
<p><a href="{% url 'polls:index' %}">Back to polls</a></p>
